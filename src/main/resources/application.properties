# Use pontos para bater com o @Value("${strava.client.id}")
strava.client.id=${STRAVA_CLIENT_ID}
strava.client.secret=${STRAVA_CLIENT_SECRET}
strava.access.token=${STRAVA_ACCESS_TOKEN}
strava.refresh.token=${STRAVA_REFRESH_TOKEN}

# Perfil do Atleta para Cßlculo de Karvonen
atleta.hr-max=173
atleta.hr-resting=53

# ConfigurańŃo MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/stravafit?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Configurań§es extras do Spring (·til para debug)
logging.level.jackson.stravafit=DEBUG

#Configurań§es/ConexŃo REST/ API GEMINI
gemini.api.key=${GEMINI_API_KEY}